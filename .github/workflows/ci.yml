name: core-ci

on:
  push:
  pull_request:

jobs:
  core:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.15"
      - run: uv sync --all-groups --frozen
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run radcounter-validate configs/scenarios/analytic_free_space.yaml
